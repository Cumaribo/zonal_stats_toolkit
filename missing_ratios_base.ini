[project]
name = missing_ratios_base
global_work_dir = workdir_ratios
global_output_dir = output_ratios
log_level = INFO

[job:country]
agg_vector = data/vector_basedata/cartographic_ee_r264_correspondence.gpkg
agg_field = nev_name
operations = mean, stdev, valid_count, total_count
row_col_order = agg_field, base_raster
base_raster_pattern = data/ratios/*_ratio_*.tif

[job:biome]
agg_vector = data/vector_basedata/Biome.gpkg
agg_field = WWF_biome
operations = mean, stdev, valid_count, total_count
row_col_order = agg_field, base_raster
base_raster_pattern = data/ratios/*_ratio_*.tif

[job:region_wb]
agg_vector = data/vector_basedata/cartographic_ee_r264_correspondence.gpkg
agg_field = region_wb
operations = mean, stdev, valid_count, total_count
row_col_order = agg_field, base_raster
base_raster_pattern = data/ratios/*_ratio_*.tif

[job:income_grp]
agg_vector = data/vector_basedata/cartographic_ee_r264_correspondence.gpkg
agg_field = income_grp
operations = mean, stdev, valid_count, total_count
row_col_order = agg_field, base_raster
base_raster_pattern = data/ratios/*_ratio_*.tif