[project]
name = global_access_assesment
global_work_dir = ./workdir_access
global_output_dir = ./output_access
log_level = INFO
; To disable a job, rename the section (e.g. change [job:country] to [skip:job:country]) or comment lines with ;

[job:country]
agg_vector = data/vector_basedata/cartographic_ee_r264_correspondence.gpkg
agg_field = nev_name
operations = mean,stdev,valid_count,total_count
row_col_order = agg_field,base_raster
base_raster_pattern = data/base_years/*nature_access*.tif

[job:region_wb]
agg_vector = data/vector_basedata/cartographic_ee_r264_correspondence.gpkg
agg_field = region_wb
operations = mean,stdev,valid_count,total_count
row_col_order = agg_field,base_raster
base_raster_pattern = data/base_years/*nature_access*.tif

[job:income_grp]
agg_vector = data/vector_basedata/cartographic_ee_r264_correspondence.gpkg
agg_field = income_grp
operations = mean,stdev,valid_count,total_count
row_col_order = agg_field,base_raster
base_raster_pattern = data/base_years/*nature_access*.tif

[job:biome]
agg_vector = data/vector_basedata/Biome.gpkg
agg_field = WWF_biome
operations = mean,stdev,valid_count,total_count
row_col_order = agg_field,base_raster
base_raster_pattern = data/base_years/*nature_access*.tif
