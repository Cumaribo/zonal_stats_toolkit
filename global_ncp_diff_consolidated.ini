[project]
name = global_ncp_diff_consolidated
global_work_dir = ./workdir_diff_consolidated
global_output_dir = ./output_diff_consolidated
log_level = INFO

[job:country]
agg_vector = data/vector_basedata/cartographic_ee_r264_correspondence.gpkg
agg_field = nev_name
operations = mean,stdev,valid_count,total_count
row_col_order = agg_field,base_raster
base_raster_pattern = data/2020_1992_ch_ha/*.tif
base_vector_pattern = data/2020_1992_ch_ha/c_protection_ch.gpkg[Rt_diff_1992_2020,Rt_ratio_diff_1992_2020]

[job:region_wb]
agg_vector = data/vector_basedata/cartographic_ee_r264_correspondence.gpkg
agg_field = region_wb
operations = mean,stdev,valid_count,total_count
