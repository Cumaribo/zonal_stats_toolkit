[project]
name = global_access_grid
global_work_dir = ./workdir_access_grid
global_output_dir = ./output_access_grid
log_level = INFO

[job:grid_10km]
agg_vector = /data/vector_basedata/AOOGrid_10x10km_land_4326_clean.gpkg
agg_field = fid
operations = mean,stdev,valid_count,total_count
row_col_order = agg_field,base_raster
base_raster_pattern = data/base_years/*nature_access*.tif